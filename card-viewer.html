<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Card Price Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #1a1a1a;
      --border:    #2a2a2a;
      --accent:    #f5c518;
      --text:      #f0f0f0;
      --muted:     #888;
      --green:     #22c55e;
      --yellow:    #eab308;
      --orange:    #f97316;
      --red:       #ef4444;
      --dark-red:  #7f1d1d;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      padding: 32px 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .game-emoji {
      font-size: 2rem;
      line-height: 1;
    }
    .header-text h1 {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .header-text h2 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1.2;
    }

    /* Card name */
    .card-name {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .card-set {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 24px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    /* Condition badge */
    .condition-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .condition-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .condition-badge {
      font-size: 1rem;
      font-weight: 800;
      padding: 6px 18px;
      border-radius: 99px;
      letter-spacing: 0.05em;
    }
    .badge-NM  { background: rgba(34,197,94,0.15);  color: var(--green);  border: 1.5px solid var(--green);  }
    .badge-LP  { background: rgba(234,179,8,0.15);  color: var(--yellow); border: 1.5px solid var(--yellow); }
    .badge-MP  { background: rgba(249,115,22,0.15); color: var(--orange); border: 1.5px solid var(--orange); }
    .badge-HP  { background: rgba(239,68,68,0.15);  color: var(--red);    border: 1.5px solid var(--red);    }
    .badge-D   { background: rgba(127,29,29,0.25);  color: #fca5a5;       border: 1.5px solid #7f1d1d;       }

    /* Condition description */
    .condition-desc {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* Price */
    .price-row {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      margin-bottom: 6px;
    }
    .price-dollar {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      padding-bottom: 4px;
    }
    .price-amount {
      font-size: 3.5rem;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
    }
    .price-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* Footer */
    .footer {
      margin-top: 28px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
    }

    /* Error state */
    .error {
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
    }
    .error h2 { color: var(--text); margin-bottom: 8px; font-size: 1.2rem; }
    .error p  { font-size: 0.9rem; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card" id="viewer">
    <div class="error">
      <h2>Loading…</h2>
      <p>Reading card info from QR code.</p>
    </div>
  </div>

  <script>
    const CONDITION_LABELS = {
      NM:  'Near Mint',
      LP:  'Lightly Played',
      MP:  'Moderately Played',
      HP:  'Heavily Played',
      D:   'Damaged',
    };

    const CONDITION_DESCS = {
      NM:  'No visible wear. Sharp corners, clean surface — collector-ready condition.',
      LP:  'Minor surface wear or small scratches. Still looks great in sleeves.',
      MP:  'Noticeable wear, creases, or whitening on edges. Playable condition.',
      HP:  'Heavy wear throughout — creases, scratches, and edge damage visible.',
      D:   'Significant damage — torn, heavily creased, or altered. For casual play only.',
    };

    const GAME_LABELS = {
      pokemon:  'Pokémon TCG',
      mtg:      'Magic: The Gathering',
      yugioh:   'Yu-Gi-Oh!',
      sports:   'Sports Cards',
      onepiece: 'One Piece TCG',
      gundam:   'Gundam Card Game',
    };

    const GAME_EMOJIS = {
      pokemon:  '⚡',
      mtg:      '🔮',
      yugioh:   '🃏',
      sports:   '🏆',
      onepiece: '⚓',
      gundam:   '🤖',
    };

    function getParams() {
      const p = new URLSearchParams(window.location.search);
      return {
        condition: p.get('c') || '',
        price:     p.get('p') || '',
        name:      p.get('n') || '',
        game:      p.get('g') || '',
        set:       p.get('s') || '',
        num:       p.get('num') || '',
      };
    }

    function formatPrice(raw) {
      const n = parseFloat(raw);
      if (isNaN(n)) return null;
      return n.toFixed(2);
    }

    function render() {
      const { condition, price, name, game, set, num } = getParams();
      const viewer = document.getElementById('viewer');

      const formattedPrice = formatPrice(price);

      if (!name || !formattedPrice || !condition) {
        viewer.innerHTML = `
          <div class="error">
            <h2>Invalid QR Code</h2>
            <p>This QR code is missing required card data. Please re-scan or ask the seller for assistance.</p>
          </div>`;
        return;
      }

      const condLabel = CONDITION_LABELS[condition] || condition;
      const condDesc  = CONDITION_DESCS[condition]  || '';
      const gameLabel = GAME_LABELS[game]  || game || 'Trading Card';
      const gameEmoji = GAME_EMOJIS[game]  || '🃏';
      const badgeClass = `badge-${condition}`;

      // Split price into integer and decimal parts
      const [intPart, decPart] = formattedPrice.split('.');
      const setLine = [set, num ? `#${num}` : ''].filter(Boolean).join(' · ');

      viewer.innerHTML = `
        <div class="header">
          <span class="game-emoji">${gameEmoji}</span>
          <div class="header-text">
            <h1>${gameLabel}</h1>
            <h2>Card Price</h2>
          </div>
        </div>

        <div class="card-name">${escHtml(name)}</div>
        ${setLine ? `<div class="card-set">${escHtml(setLine)}</div>` : '<div class="card-set" style="margin-bottom:24px"></div>'}

        <div class="divider"></div>

        <div class="condition-row">
          <span class="condition-label">Condition</span>
          <span class="condition-badge ${badgeClass}">${condLabel}</span>
        </div>
        <div class="condition-desc">${condDesc}</div>

        <div class="divider"></div>

        <div class="price-row">
          <span class="price-dollar">$</span>
          <span class="price-amount">${intPart}<span style="font-size:2rem">.${decPart}</span></span>
        </div>
        <div class="price-label">Asking Price</div>

        <div class="footer">Scan the QR code again to refresh · Prices set by the seller</div>
      `;

      // Dynamic page title
      document.title = `${name} — $${formattedPrice}`;
    }

    function escHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    render();
  </script>
</body>
</html>
